<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Swadanna Premium</title>
  <!-- <link rel="stylesheet" href="style.css"> -->
   <style>
    body {
  margin: 0;
  font-family: sans-serif;
  overflow-x: hidden;
}

/* VIDEO BACKGROUND */
.bg-video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* HERO */
.hero {
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* SLIDES */
.slider {
  height: 100%;
  position: relative;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transform: scale(1.2);
  transition: 1s ease;
}

.slide.active {
  opacity: 1;
  transform: scale(1);
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TEXT */
.content {
  position: absolute;
  bottom: 20%;
  left: 10%;
  color: white;
}

.content h1 {
  font-size: 60px;
}

/* PRODUCTS */
.products {
  padding: 50px;
  text-align: center;
}

.product {
  margin: 20px;
  padding: 20px;
  background: #2e4d2c;
  color: white;
  display: inline-block;
  cursor: pointer;
  transition: 0.3s;
}

.product:hover {
  transform: scale(1.1);
}

/* CART */
.cart {
  position: fixed;
  top: 20px;
  right: 20px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 20px;
}
   </style>
</head>

<body>

<!-- HERO -->
<section class="hero">

  <!-- VIDEO BACKGROUND -->
  <video autoplay muted loop class="bg-video">
    <source src="video.mp4" type="video/mp4">
  </video>

  <!-- SLIDER -->
  <div class="slider">

    <div class="slide active">
      <img src="https://images.unsplash.com/photo-1585238342028-4c9f7c5f6b7f">
      <div class="content">
        <h1>Swadanna</h1>
        <p>The Soul of Snacking</p>
      </div>
    </div>

    <div class="slide">
      <img src="https://images.unsplash.com/photo-1604908554164-6c7d7b9f3b6b">
      <div class="content">
        <h1>Masala Magic</h1>
        <p>Crunchy & Spicy</p>
      </div>
    </div>

  </div>

</section>

<!-- PRODUCTS -->
<section class="products">

  <div class="product" onclick="addToCart('250g',90)">
    250g - ₹90
  </div>

  <div class="product" onclick="addToCart('500g',180)">
    500g - ₹180
  </div>

  <div class="product" onclick="addToCart('1kg',320)">
    1kg - ₹320
  </div>

</section>

<!-- CART -->
<div class="cart">
  🛒 <span id="cart-count">0</span>
</div>

<!-- <script src="script.js"></script> -->
 <script>
    let slides = document.querySelectorAll(".slide");
let index = 0;

/* AUTO SLIDE */
setInterval(() => {
  changeSlide(1);
}, 3000);

function changeSlide(direction) {
  slides[index].classList.remove("active");
  index = (index + direction + slides.length) % slides.length;
  slides[index].classList.add("active");
}

/* SWIPE SUPPORT */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) {
    changeSlide(1);
  } else if (endX - startX > 50) {
    changeSlide(-1);
  }
});

/* PARALLAX */
document.addEventListener("mousemove", e => {
  let x = (window.innerWidth / 2 - e.clientX) / 30;
  let y = (window.innerHeight / 2 - e.clientY) / 30;

  slides[index].style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
});

/* CART SYSTEM */
let cartCount = 0;

function addToCart(name, price) {
  cartCount++;
  document.getElementById("cart-count").innerText = cartCount;

  alert(name + " added to cart!");
}
 </script>
</body>
</html>
