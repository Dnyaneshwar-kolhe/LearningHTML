
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrustNestmarket</title>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #000;
  color: #fff;
  overflow-x: hidden;
}

/* Navbar */
.navbar {
  position: fixed;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  backdrop-filter: blur(10px);
  z-index: 1000;
}

.navbar a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* Hero */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 80px;
}

.title {
  font-size: 70px;
  opacity: 0;
}

.subtitle {
  font-size: 20px;
  opacity: 0;
}

/* Sticky Section */
.sticky-section {
  height: 200vh;
}

.sticky-content {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.sticky-text {
  font-size: 50px;
  opacity: 0;
}

.sticky-img {
  width: 40%;
  border-radius: 20px;
  transform: scale(0.8);
}

/* Parallax */
.parallax {
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1492724441997-5dc865305da7") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

.parallax h2 {
  font-size: 50px;
  background: rgba(0,0,0,0.5);
  padding: 20px;
}

/* Products */
.products {
  padding: 100px;
}

.product {
  margin-bottom: 100px;
  opacity: 0;
  transform: translateY(50px);
}

.product h2 {
  font-size: 40px;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- Navbar -->
<header class="navbar">
  <div class="logo">TrustNestmarket</div>
  <nav>
    <a href="#">Store</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- Hero -->
<section class="hero">
  <h1 class="title">TrustNest Market </h1>
  <p class="subtitle">Premium experience like never before</p>
</section>

<!-- Sticky Section -->
<section class="sticky-section">
  <div class="sticky-content">
    <h2 class="sticky-text">Designed for Elegance</h2>
    <img class="sticky-img" src="https://images.unsplash.com/photo-1512499617640-c2f999098c01">
  </div>
</section>

<!-- Parallax -->
<section class="parallax">
  <h2>Feel the Motion</h2>
</section>

<!-- Products -->
<section class="products">
  <div class="product">
    <h2>Smart Watch</h2>
    <p>Minimal & Powerful</p>
  </div>

  <div class="product">
    <h2>Headphones</h2>
    <p>Immersive Sound</p>
  </div>

  <div class="product">
    <h2>Sneakers</h2>
    <p>Move Freely</p>
  </div>
</section>

<!-- Footer -->
<footer>
  <p>© 2026 TrustNestmarket</p>
  <p>Design & Developed by Dnyaneshwar Kolhe</p>
</footer>

<script>
gsap.registerPlugin(ScrollTrigger);

// Hero animation
gsap.to(".title", {
  opacity: 1,
  y: -20,
  duration: 1.5
});

gsap.to(".subtitle", {
  opacity: 1,
  y: -10,
  delay: 0.5,
  duration: 1.5
});

// Sticky animation
gsap.to(".sticky-img", {
  scrollTrigger: {
    trigger: ".sticky-section",
    start: "top top",
    end: "bottom top",
    scrub: true
  },
  scale: 1.2
});

gsap.to(".sticky-text", {
  scrollTrigger: {
    trigger: ".sticky-section",
    start: "top center",
    scrub: true
  },
  opacity: 1,
  x: 50
});

// Parallax
gsap.to(".parallax", {
  scrollTrigger: {
    trigger: ".parallax",
    scrub: true
  },
  backgroundPosition: "50% 100%"
});

// Product reveal
gsap.utils.toArray(".product").forEach((el) => {
  gsap.to(el, {
    scrollTrigger: {
      trigger: el,
      start: "top 85%"
    },
    opacity: 1,
    y: 0,
    duration: 1
  });
});
</script>

</body>
</html>
