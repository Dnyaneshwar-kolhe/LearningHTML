<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrustNestmarket</title>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
/* --- GLOBAL --- */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background:#000; color:#fff; overflow-x:hidden; }
a { text-decoration:none; color:white; }

/* --- NAVBAR --- */
.navbar {
  position: fixed; top:0; width:100%; padding:20px 50px;
  display:flex; justify-content:space-between; align-items:center;
  backdrop-filter:blur(10px); z-index:1000; background:rgba(0,0,0,0.6);
}
.logo { font-size:28px; font-weight:700; color:#00f7ff; letter-spacing:1px; }
.navbar button { background:none; border:1px solid #00f7ff; color:#00f7ff; padding:8px 15px; margin-left:15px; border-radius:5px; transition:0.3s; cursor:pointer; }
.navbar button:hover { background:#00f7ff; color:#000; }

/* --- HERO --- */
.hero {
  height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; position:relative;
}
.hero h1 { font-size:70px; margin-bottom:20px; opacity:0; }
.hero p { font-size:22px; opacity:0; }

/* --- PRODUCTS --- */
.products { display:flex; flex-wrap:wrap; justify-content:center; padding:80px 50px; gap:50px; }
.product { background:#111; padding:20px; border-radius:15px; width:250px; text-align:center; transition:0.4s; cursor:pointer; opacity:0; transform:translateY(50px); }
.product:hover { transform:translateY(-10px); box-shadow:0 20px 40px rgba(0,255,255,0.3); }
.product img { width:100%; border-radius:10px; margin-bottom:15px; transition:0.4s; }
.product img:hover { transform:scale(1.05); }
.product h3 { font-size:22px; margin-bottom:5px; }
.product p { font-size:18px; margin-bottom:10px; }
.product button { background:#00f7ff; border:none; color:#000; padding:10px 15px; border-radius:5px; cursor:pointer; transition:0.3s; }
.product button:hover { background:#00d4ff; }

/* --- CART PANEL --- */
.cart {
  position:fixed; top:0; right:-400px; width:350px; height:100%; background:#111; padding:30px; transition:0.5s; overflow-y:auto; z-index:2000;
}
.cart.show { right:0; }
.cart h2 { margin-bottom:20px; }
.cart-item { margin-bottom:15px; }
.cart-item span { float:right; }

/* --- LOGIN MODAL --- */
.login-box {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#111; padding:40px; border-radius:15px; display:none; z-index:3000; width:300px; text-align:center;
}
.login-box input { width:100%; margin:10px 0; padding:10px; border:none; border-radius:5px; background:#222; color:#fff; }
.login-box button { margin-top:15px; padding:10px 15px; border:none; border-radius:5px; background:#00f7ff; color:#000; cursor:pointer; }
.login-box button:hover { background:#00d4ff; }

/* --- FOOTER --- */
footer { text-align:center; padding:30px; opacity:0.5; }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">TrustNestmarket</div>
  <div>
    <button onclick="toggleLogin()">Login</button>
    <button onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Welcome to TrustNestmarket</h1>
  <p>Premium shopping experience with style & motion</p>
</section>

<!-- PRODUCTS -->
<section class="products">
  <div class="product">
    <img src="https://images.unsplash.com/photo-1512499617640-c2f999098c01">
    <h3>Smart Watch</h3>
    <p>₹2999</p>
    <button onclick="addToCart('Smart Watch',2999)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1518441902117-8d5b3c1b1eaa">
    <h3>Wireless Headphones</h3>
    <p>₹1999</p>
    <button onclick="addToCart('Headphones',1999)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1528701800489-20be3c1a4b63">
    <h3>Premium Sneakers</h3>
    <p>₹3999</p>
    <button onclick="addToCart('Sneakers',3999)">Add to Cart</button>
  </div>
</section>

<!-- CART -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: ₹<span id="total">0</span></h3>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- FOOTER -->
<footer>© 2026 TrustNestmarket</footer>

<script>
let cart = JSON.parse(localStorage.getItem("cart"))||[];

function updateCart(){
  const cartItems = document.getElementById("cartItems");
  let total=0;
  cartItems.innerHTML="";
  cart.forEach(item=>{
    cartItems.innerHTML += `<div class='cart-item'>${item.name}<span>₹${item.price}</span></div>`;
    total+=item.price;
  });
  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=cart.length;
  localStorage.setItem("cart",JSON.stringify(cart));
}

function addToCart(name,price){ cart.push({name,price}); updateCart(); }

function toggleCart(){ document.getElementById("cart").classList.toggle("show"); }
function toggleLogin(){ document.getElementById("loginBox").style.display = document.getElementById("loginBox").style.display==="block"?"none":"block"; }
function login(){ let email=document.getElementById("email").value; localStorage.setItem("user",email); alert("Logged in as "+email); }

updateCart();

/* --- GSAP Animations --- */
gsap.from(".hero h1",{opacity:0, y:50,duration:1});
gsap.from(".hero p",{opacity:0, y:50,duration:1,delay:0.3});
gsap.utils.toArray(".product").forEach((el,i)=>{ gsap.to(el,{scrollTrigger:{trigger:el,start:"top 85%"},opacity:1,y:0,duration:1,delay:i*0.2}); });
</script>

</body>
</html>
