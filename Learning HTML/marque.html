<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <marquee bgcolor="navyblue" behavior="scroll" direction="">Honda Airlines</marquee>
    <marquee bgcolor="navyblue" behavior="alternate" direction="right">Honda Airlines</marquee>
    <marquee bgcolor="navyblue" scrollamount="50" behavior="" direction="up">Honda Airlines</marquee>
    <marquee bgcolor="navyblue" scrolldelay="100"  behavior="" direction="down">Honda Airlines</marquee>
    <marquee bgcolor="navyblue" behavior="slide" direction="">Honda Airlines</marquee>
</body>
</html>
